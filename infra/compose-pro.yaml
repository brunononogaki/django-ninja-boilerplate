version: "3.9"

services:
  database:
    container_name: boilerplate_database
    image: postgres:17.0
    env_file:
      - ../.env.production
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - my-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    container_name: boilerplate_back
    build:
      context: ..
      dockerfile: infra/Dockerfile-pro
    env_file:
      - ../.env.production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.myapi.rule=Host(`${BACKEND_FQDN}`)"
      - "traefik.http.routers.myapi.entrypoints=websecure"
      - "traefik.http.routers.myapi.tls=true"
      - "traefik.http.routers.myapi.tls.certresolver=letsencrypt"
      - "traefik.http.routers.myapi.middlewares=myapi-ratelimit"
      - "traefik.http.middlewares.myapi-ratelimit.rateLimit.average=100"
      - "traefik.http.middlewares.myapi-ratelimit.rateLimit.burst=50"
      - "traefik.http.middlewares.myapi-ratelimit.rateLimit.period=1m"
      - "traefik.http.services.myapi.loadbalancer.server.port=8000"
      - "traefik.docker.network=my-network"
    networks:
      - my-network
    depends_on:
      - database
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - DJANGO_SETTINGS_MODULE=myapi.settings
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:

networks:
  my-network:
    external: true
